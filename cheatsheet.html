<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TaxonWorks Omnibox — Cheatsheet</title>
  <style>
    :root {
      color-scheme: light dark;
      --fg: #15141a;
      --bg: #fff;
      --muted: #666;
      --error: #a00;
      --error-bg: #fdecea;
      --code-bg: #f4f4f4;
      --border: #ddd;
      --row-alt: #fafafa;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #fbfbfe;
        --bg: #1c1b22;
        --muted: #b0b0b8;
        --error: #ff8080;
        --error-bg: #2d1b1b;
        --code-bg: #2b2a33;
        --border: #3a3944;
        --row-alt: #232228;
      }
    }
    body {
      font-family: system-ui, sans-serif;
      max-width: 1100px;
      margin: 2em auto;
      padding: 0 1.4em;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.55;
    }
    h1 { font-size: 1.5em; margin: 0 0 0.5em 0; }
    h2 { font-size: 1.1em; margin: 1.6em 0 0.4em 0; }
    .error-banner {
      background: var(--error-bg);
      border-left: 4px solid var(--error);
      padding: 0.8em 1em;
      border-radius: 4px;
      margin: 0 0 1.5em 0;
    }
    .error-banner h2 { color: var(--error); margin: 0 0 0.4em 0; }
    .error-banner p { margin: 0.3em 0; }
    code {
      background: var(--code-bg);
      padding: 0.1em 0.35em;
      border-radius: 3px;
      font-family: ui-monospace, monospace;
      font-size: 0.92em;
    }
    .muted { color: var(--muted); font-size: 0.9em; }
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 0.4em 0 1.5em;
      font-size: 0.92em;
    }
    th, td {
      padding: 0.5em 0.65em;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    th { font-weight: 600; }
    tr:nth-child(even) { background: var(--row-alt); }
    td.aliases { white-space: nowrap; }
    ul { padding-left: 1.4em; margin: 0.4em 0 0.6em 0; }
    a { color: inherit; }
    @media (max-width: 720px) {
      th:nth-child(3), td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>
  <div id="root">Loading…</div>
  <script src="storage.js"></script>
  <script src="bangs.js"></script>
  <script src="cheatsheet.js"></script>
</body>
</html>
